<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Happy Birthday Edric</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body { font-family: sans-serif; text-align:center; padding:40px; background:#0f172a; color:white; }
  .card { background:#1e293b; padding:30px; border-radius:14px; max-width:500px; margin:auto; }
  .btn { background:#3b82f6; border:none; padding:10px 20px; border-radius:8px; color:white; cursor:pointer; }
  .code { display:none; margin-top:15px; font-size:1.2rem; background:#0f172a; padding:10px; border-radius:8px; }
  .copy { background:#10b981; border:none; padding:8px 14px; border-radius:8px; margin-top:10px; cursor:pointer; }
</style>
</head>
<body>

<div class="card">
  <h1>Happy Birthday, Edric! 🎉</h1>
  <p>Hope your birthday is <strong>plane awesome</strong> ✈️</p>

  <button class="btn" onclick="reveal()">Tap to reveal your code</button>

  <div id="codeBox" class="code">
    <div id="codeText">ABCDE-12345-FGHJK</div>
    <button class="copy" onclick="copyCode()">Copy</button>
    <div id="status"></div>
  </div>
</div>

<script>
function reveal() {
  document.getElementById("codeBox").style.display = "block";
}

function copyCode() {
  const code = document.getElementById("codeText").innerText;
  navigator.clipboard.writeText(code);
  document.getElementById("status").innerText = "Copied!";
  setTimeout(()=>document.getElementById("status").innerText="",2000);
}
</script>

</body>
</html>
